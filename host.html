<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>شاشة المقدم - حروف</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Lalezar&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
    body { background-color: #2b164d; color: white; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .header-logo { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 10px 30px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .header-logo h1 { font-family: 'Lalezar'; margin: 0; line-height: 1; }
    .title-huroof { color: #ffca28; font-size: 35px; text-shadow: 2px 2px 0 #1d0b33; }
    .title-host { color: #ff5252; font-size: 22px; text-shadow: 2px 2px 0 #1d0b33; margin-top: 8px; }

    .board-container { position: relative; background: conic-gradient(from 315deg, var(--team2-color, #f37021) 25%, var(--team1-color, #12b49c) 0 50%, var(--team2-color, #f37021) 0 75%, var(--team1-color, #12b49c) 0); border-radius: 20px; width: 100%; max-width: 380px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); height: 290px; overflow: hidden; }
    .board { position: absolute; top: 50%; left: 50%; width: 770px; height: 640px; margin-top: -320px; margin-left: -380px; transform: scale(0.40); }

    .hex-outer { position: absolute; width: 140px; height: 160px; background: #392265; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s; }
    .hex-outer:active { transform: scale(0.95); z-index: 10; }
    .hex-inner { width: 100%; height: 100%; background: #ffffff; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; align-items: center; justify-content: center; transform: scale(0.85); font-family: 'Lalezar', sans-serif; font-size: 70px; color: #392265; padding-top: 15px; }
    .hex-inner.answered { color: transparent !important; text-shadow: none !important; }
    .hex-inner.highlighted { background: #ffeb3b !important; color: #392265 !important; transform: scale(0.92); box-shadow: inset 0 0 20px rgba(0,0,0,0.2); }

    .hex-outer:nth-child(1) { top: 0px; left: 0px; } .hex-outer:nth-child(2) { top: 0px; left: 140px; } .hex-outer:nth-child(3) { top: 0px; left: 280px; } .hex-outer:nth-child(4) { top: 0px; left: 420px; } .hex-outer:nth-child(5) { top: 0px; left: 560px; }
    .hex-outer:nth-child(6) { top: 120px; left: 70px; } .hex-outer:nth-child(7) { top: 120px; left: 210px; } .hex-outer:nth-child(8) { top: 120px; left: 350px; } .hex-outer:nth-child(9) { top: 120px; left: 490px; } .hex-outer:nth-child(10) { top: 120px; left: 630px; }
    .hex-outer:nth-child(11) { top: 240px; left: 0px; } .hex-outer:nth-child(12) { top: 240px; left: 140px; } .hex-outer:nth-child(13) { top: 240px; left: 280px; } .hex-outer:nth-child(14) { top: 240px; left: 420px; } .hex-outer:nth-child(15) { top: 240px; left: 560px; }
    .hex-outer:nth-child(16) { top: 360px; left: 70px; } .hex-outer:nth-child(17) { top: 360px; left: 210px; } .hex-outer:nth-child(18) { top: 360px; left: 350px; } .hex-outer:nth-child(19) { top: 360px; left: 490px; } .hex-outer:nth-child(20) { top: 360px; left: 630px; }
    .hex-outer:nth-child(21) { top: 480px; left: 0px; } .hex-outer:nth-child(22) { top: 480px; left: 140px; } .hex-outer:nth-child(23) { top: 480px; left: 280px; } .hex-outer:nth-child(24) { top: 480px; left: 420px; } .hex-outer:nth-child(25) { top: 480px; left: 560px; }

    .control-panel { background: rgba(255,255,255,0.1); width: 100%; max-width: 380px; border-radius: 20px; padding: 20px; text-align: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); }
    .question-box { margin-bottom: 20px; min-height: 120px; display: flex; flex-direction: column; justify-content: center; }
    .letter-badge { background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 50px; font-family: 'Lalezar'; font-size: 24px; display: inline-block; margin-bottom: 10px; color: #ffeb3b; }
    .q-text { font-size: 18px; font-weight: 900; margin-bottom: 15px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5);}
    .a-text { font-size: 20px; font-weight: 900; color: #76ff03; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; border: 1px solid rgba(118, 255, 3, 0.3);}
    
    .buzzer-winner-indicator { background: #392265; color: white; padding: 15px; border-radius: 12px; font-weight: 900; font-size: 18px; margin-bottom: 15px; border: 2px solid #ffca28; }
    .host-timer-text { font-family: 'Lalezar'; font-size: 35px; color: #76ff03; margin-top: 5px; }

    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    .btn { padding: 12px 10px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; font-family: 'Cairo'; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
    .btn:active { transform: scale(0.95); }
    .btn-team1 { background-color: var(--team1-color, #12b49c); border: 1px solid rgba(255,255,255,0.3); }
    .btn-team2 { background-color: var(--team2-color, #f37021); border: 1px solid rgba(255,255,255,0.3); }
    .btn-cancel { background-color: #f44336; border: 1px solid rgba(255,255,255,0.2); }
    .btn-change { background-color: #ffca28; color: #392265; border: 1px solid rgba(0,0,0,0.2); }
    .btn-reset-buzzer { background-color: #00e5ff; color: #1d0b33; grid-column: span 2; font-size: 18px; }

    .disabled-panel { opacity: 0.4; pointer-events: none; filter: grayscale(30%); }
    .hidden { display: none !important; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
    .modal-box { background: #392265; padding: 30px; border-radius: 20px; width: 90%; max-width: 320px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  
  <div class="header-logo">
    <h1 class="title-huroof">حروف</h1>
    <h1 class="title-host">شاشة المقدم</h1>
  </div>
  
  <div class="board-container">
    <div class="board" id="host-board"></div>
  </div>
  
  <div class="control-panel">
    <div id="buzzer-winner-box" class="buzzer-winner-indicator hidden">
      🚨 ضغط الجرس: <span id="buzzer-winner-name" style="color: #ffca28;">فُلان</span>
      <div id="host-timer-display" class="host-timer-text">5</div>
    </div>

    <div id="active-question-state">
      <div class="question-box">
        <div><span class="letter-badge" id="display-letter">حرف: --</span></div>
        <div class="q-text" id="display-q">اختر خلية من اللوحة ليظهر السؤال هنا</div>
        <div class="a-text hidden" id="display-a">جواب...</div>
      </div>
      
      <div class="btn-grid disabled-panel" id="action-buttons">
        <button class="btn btn-team1" id="btn-t1"><span>🚩</span> <span id="t1-name">الفريق الأول</span></button>
        <button class="btn btn-team2" id="btn-t2"><span>🚩</span> <span id="t2-name">الفريق الثاني</span></button>
        <button class="btn btn-cancel" id="btn-cancel"><span>✖</span> إلغاء التحديد</button>
        <button class="btn btn-change" id="btn-change"><span>🔄</span> تغيير السؤال</button>
        <button class="btn btn-reset-buzzer" id="btn-reset-buzzer"><span>🔔</span> تصفير وإعادة تفعيل الجرس</button>
      </div>
    </div>
  </div>

  <div id="cancel-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div id="cancel-letter-display" style="width: 70px; height: 80px; margin: 0 auto 20px auto; background: rgba(255,255,255,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Lalezar'; font-size: 40px; border: 2px solid rgba(255,255,255,0.3);"></div>
      <h3 style="margin-bottom: 15px; color: #ff5252; font-size: 22px;">إلغاء ملكية الحرف؟</h3>
      <div style="display: flex; gap: 10px;">
        <button onclick="document.getElementById('cancel-modal').classList.add('hidden')" style="flex: 1; padding: 10px; border-radius: 10px; border: none; background: #666; color: white; font-family: 'Cairo'; font-weight: bold; font-size: 16px; cursor: pointer;">تراجع</button>
        <button id="confirm-cancel-btn" style="flex: 1; padding: 10px; border-radius: 10px; border: none; background: #f44336; color: white; font-family: 'Cairo'; font-weight: bold; font-size: 16px; cursor: pointer;">إلغاء الملكية 🗑️</button>
      </div>
    </div>
  </div>

  <script>
    const socket = io();
    const urlParams = new URLSearchParams(window.location.search);
    const roomID = urlParams.get('room');
    if (!roomID) { alert('الرجاء استخدام الرابط المقدم من الصفحة الرئيسية'); } 
    else { socket.emit('join-room', { roomID, playerName: 'المقدم' }); }

    setInterval(() => { socket.emit('ping'); }, 25000); 

    const boardEl = document.getElementById('host-board');
    const actionButtons = document.getElementById('action-buttons');
    const displayA = document.getElementById('display-a');
    const buzzerWinnerBox = document.getElementById('buzzer-winner-box');
    const buzzerWinnerName = document.getElementById('buzzer-winner-name');
    const hostTimerDisplay = document.getElementById('host-timer-display');
    
    let currentCellIndex = null; let currentSelectedCellIndex = null; let currentLetter = '';

    socket.on('settings', (settings) => {
      document.documentElement.style.setProperty('--team1-color', settings.team1Color);
      document.documentElement.style.setProperty('--team2-color', settings.team2Color);
      document.getElementById('t1-name').textContent = settings.team1Name || 'الفريق الأول';
      document.getElementById('t2-name').textContent = settings.team2Name || 'الفريق الثاني';
    });

    function renderHostBoard(state) {
      boardEl.innerHTML = '';
      const cells = state.cells || [];
      cells.forEach((cell, index) => {
        const hexOuter = document.createElement('div'); hexOuter.className = 'hex-outer';
        const hexInner = document.createElement('div'); hexInner.className = 'hex-inner';
        hexInner.textContent = cell.letter;

        if (cell.color) { hexInner.style.backgroundColor = cell.color; hexInner.classList.add('answered'); }
        if (index === state.highlightedCellIndex && !cell.color) { hexInner.classList.add('highlighted'); }
        
        hexOuter.addEventListener('click', () => { 
            currentSelectedCellIndex = index;
            if (cell.color) { 
                document.getElementById('cancel-letter-display').textContent = cell.letter;
                document.getElementById('cancel-modal').classList.remove('hidden'); return; 
            } 
            socket.emit('select-cell', index); 
        });
        hexOuter.appendChild(hexInner); boardEl.appendChild(hexOuter);
      });
    }

    document.getElementById('confirm-cancel-btn').addEventListener('click', () => {
        socket.emit('cancel-ownership', currentSelectedCellIndex);
        document.getElementById('cancel-modal').classList.add('hidden');
    });

    socket.on('game-state', (state) => { 
      renderHostBoard(state); 
      if (state.buzzerLocked && state.buzzerWinner) {
        buzzerWinnerName.textContent = `${state.buzzerWinner.name} (${state.buzzerWinner.team})`;
        hostTimerDisplay.textContent = state.timeLeft;
        buzzerWinnerBox.classList.remove('hidden');
      } else {
        buzzerWinnerBox.classList.add('hidden');
      }
    });

    socket.on('buzzer-locked', (data) => {
      buzzerWinnerName.textContent = `${data.winner.name} (${data.winner.team})`;
      hostTimerDisplay.textContent = data.timeLeft;
      hostTimerDisplay.style.color = '#76ff03';
      buzzerWinnerBox.classList.remove('hidden');
    });

    socket.on('timer-tick', (data) => { hostTimerDisplay.textContent = data.timeLeft; });
    
    socket.on('timer-phase-change', (data) => { 
      hostTimerDisplay.textContent = data.timeLeft; 
      hostTimerDisplay.style.color = '#ff5252'; 
      buzzerWinnerName.textContent = 'وقت الفريق الآخر'; 
    });
    
    socket.on('buzzer-reset', () => { buzzerWinnerBox.classList.add('hidden'); });

    socket.on('host-receive-question', (data) => {
      currentCellIndex = data.cellIndex; currentLetter = data.letter;
      document.getElementById('display-letter').textContent = `حرف: ${data.letter}`;
      document.getElementById('display-q').textContent = data.question;
      displayA.textContent = `الجواب: ${data.answer}`; displayA.classList.remove('hidden');
      actionButtons.classList.remove('disabled-panel');
    });

    socket.on('host-question-cleared', () => {
      currentCellIndex = null; currentLetter = '';
      document.getElementById('display-letter').textContent = `حرف: --`;
      document.getElementById('display-q').textContent = 'اختر خلية من اللوحة ليظهر السؤال هنا';
      displayA.classList.add('hidden'); actionButtons.classList.add('disabled-panel');
      buzzerWinnerBox.classList.add('hidden');
    });

    document.getElementById('btn-t1').addEventListener('click', () => { if (currentCellIndex !== null) socket.emit('host-assign-point', { teamIndex: 0 }); });
    document.getElementById('btn-t2').addEventListener('click', () => { if (currentCellIndex !== null) socket.emit('host-assign-point', { teamIndex: 1 }); });
    document.getElementById('btn-cancel').addEventListener('click', () => { socket.emit('host-cancel-selection'); });
    document.getElementById('btn-change').addEventListener('click', () => { if (currentCellIndex !== null) socket.emit('change-question', { cellIndex: currentCellIndex, letter: currentLetter }); });
    document.getElementById('btn-reset-buzzer').addEventListener('click', () => { socket.emit('reset-buzzer'); }); 
  </script>
</body>
</html>
